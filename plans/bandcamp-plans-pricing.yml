specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Bandcamp
providerId: bandcamp
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Music
- Marketplace
- Indie
- Audio
- Sales
- Merch
- Plans
description: >-
  Bandcamp's APIs are free for approved label and fulfillment partners. Bandcamp's revenue model is a
  percentage of artist sales (digital and merch); the seller pays a flat platform share. There is no
  per-call API fee. Public/anonymous API access is not offered.
notes: Access is gated; contact Bandcamp directly. Each user requires individual credentials tied to a Bandcamp login.
sources:
- https://bandcamp.com/developer
- https://bandcamp.com/help/seller_help
plans:
- id: bandcamp-partner
  name: Bandcamp Partner API
  type: free
  description: Free OAuth-based API access for approved label and merchandise fulfillment partners.
  entries:
  - label: API Access
    name: api_access
    type: flat
    metric: requests
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: Account API
  - name: Sales Report API (labels)
  - name: Merch Orders API (fulfillment partners)
- id: bandcamp-seller-fees
  name: Bandcamp Seller Fees
  type: usage
  description: Bandcamp takes a percentage of artist digital and merchandise sales (varies by category and product type). API consumers do not pay this directly; sellers do.
  entries:
  - label: Seller Share
    name: seller_share
    type: percentage
    metric: sale
    limit: -1
    timeFrame: per-transaction
    geo: global
    unit: 1
    price: see https://bandcamp.com/help/seller_help
    userMultiplied: false
  elements:
  - name: Digital sales share
  - name: Merch sales share
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
