specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Bandcamp
providerId: bandcamp
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
- Music
- Marketplace
- Indie
- Audio
- Sales
- Merch
- Rate Limiting
- Quotas
- Throttling
description: >-
  Bandcamp does not publicly document specific rate-limit thresholds for its developer APIs. Tokens
  expire after one hour and partners are expected to reuse tokens within their lifetime. Excessive
  requests may trigger throttling or account review.
notes: Specific RPS thresholds are not documented; coordinate with Bandcamp partner support.
sources:
- https://bandcamp.com/developer
responseCodes:
  throttled: 429
limits:
- name: Default
  scope: application
  metric: requests
  limit: see provider documentation
  notes: Not publicly documented.
- name: Token lifetime
  scope: application
  metric: minutes
  limit: 60
  notes: Access tokens expire after one hour.
policies:
- name: Token Reuse
  description: Reuse access tokens within their one-hour lifetime; do not request a new token per call.
- name: Backoff Strategy
  description: On throttling, apply exponential backoff with jitter and contact Bandcamp partner support if sustained.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
