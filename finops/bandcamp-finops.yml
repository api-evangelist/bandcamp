specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Bandcamp
providerId: bandcamp
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Music
- Marketplace
- Indie
- Audio
- Sales
- Merch
- FinOps
- Cost Management
- FOCUS
description: >-
  FOCUS-aligned FinOps profile for Bandcamp. The APIs are free; the cost lever is the seller share
  Bandcamp deducts from artist sales (digital and merch). For API consumers (labels, fulfillment
  partners) the integration cost is essentially zero on the platform side.
notes: API is free; cost concentration is on artist sales share, billed implicitly via reduced payouts.
sources:
- https://bandcamp.com/developer
- https://bandcamp.com/help/seller_help
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Bandcamp
serviceCategory: Music Marketplace
billingModel:
  pricingCategory: Revenue Share
  billingFrequency: Per-Transaction
  billingCurrency: USD
  chargeCategories:
  - Adjustment
focusColumns:
  ServiceName: Bandcamp Partner API
  ServiceCategory: Music Marketplace
  ProviderName: Bandcamp
  PublisherName: Bandcamp
  InvoiceIssuerName: Bandcamp
  BillingCurrency: USD
  ChargeCategory: Adjustment
meters:
- name: digital_sales_share
  description: Bandcamp's percentage of artist digital sales.
  unit: percent_of_sale
  aggregation: sum
  dimensions:
  - band
  - release
- name: merch_sales_share
  description: Bandcamp's percentage of merch sales.
  unit: percent_of_sale
  aggregation: sum
  dimensions:
  - band
  - product
principles:
- name: Visibility
  description: Pull Sales Report API regularly to reconcile gross sales against Bandcamp payouts.
- name: Allocation
  description: Allocate sales-share cost to the artist or release that generated it.
- name: Optimization
  description: Lever is product mix and Bandcamp Friday participation; not API-side.
- name: Accountability
  description: Label or fulfillment partner owns the API credentials and reconciliation.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
